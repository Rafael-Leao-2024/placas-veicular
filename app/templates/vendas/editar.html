{% extends "base.html" %}

{% block title %}Editar Venda{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-6">Editar Venda #{{ venda.id }}</h1>
        
        <form id="vendaForm" method="POST">
            <div class="space-y-6">
                <!-- Dados da Venda -->
                <div>
                    <label class="block text-gray-700 mb-2">Nome do Cliente *</label>
                    <input type="text" name="cliente_nome" value="{{ venda.cliente_nome }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500">
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Forma de Pagamento *</label>
                    <select name="forma_pagamento" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500">
                        <option value="dinheiro" {% if venda.forma_pagamento == 'dinheiro' %}selected{% endif %}>Dinheiro</option>
                        <option value="pix" {% if venda.forma_pagamento == 'pix' %}selected{% endif %}>PIX</option>
                        <option value="cartao" {% if venda.forma_pagamento == 'cartao' %}selected{% endif %}>Cartão</option>
                        <option value="fiado" {% if venda.forma_pagamento == 'fiado' %}selected{% endif %}>Fiado</option>
                    </select>
                </div>
                
                <!-- Itens da Venda -->
                <div>
                    <label class="block text-gray-700 mb-2">Produtos</label>
                    <div id="produtosContainer" class="space-y-3">
                        {% for item in venda.itens %}
                        <div class="produto-item grid grid-cols-3 gap-3">
                            <select name="produto_id" class="produto-select border rounded px-3 py-2" required>
                                <option value="">Selecione</option>
                                {% for produto in produtos %}
                                <option value="{{ produto.id }}" data-preco="{{ produto.preco_venda }}" data-estoque="{{ produto.estoque_atual }}"
                                    {% if produto.id == item.produto_id %}selected{% endif %}>
                                    {{ produto.descricao }} (Estoque: {{ produto.estoque_atual }})
                                </option>
                                {% endfor %}
                            </select>
                            <input type="number" name="quantidade" placeholder="Quantidade" value="{{ item.quantidade }}" class="quantidade border rounded px-3 py-2" required>
                            <input type="text" name="total" placeholder="Subtotal" value="{{ "%.2f"|format(item.venda.total) }}" class="subtotal border rounded px-3 py-2 bg-gray-100" >
                        </div>
                        {% endfor %}
                    </div>
                    <button type="button" onclick="adicionarProduto()" class="mt-2 text-blue-600 hover:text-blue-800">
                        + Adicionar outro produto
                    </button>
                </div>
            </div>
            <button type="submit" class="mt-6 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Salvar Alterações
            </button>
        </form>
    </div>
</div>
{% endblock %}
